<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/icons/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="css/lib/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
    <title>Сериализатор форм</title>
  </head>

  <body>
    <header>
      <!-- Навигационная панель -->
      <div
        class="d-block px-3 py-2 text-center text-bold skippy"
        style="background-color: #083880; opacity: 90%"
      >
        <a
          href="https://getbootstrap.com/"
          class="text-white text-decoration-none"
          >There's a newer version of Bootstrap!</a
        >
      </div>
      <nav
        class="navbar navbar-expand-md navbar-dark bg-primary bg-gradient mb-4 py-0"
      >
        <div class="container d-flex align-items-center">
          <!-- Логотип -->
          <a class="navbar-brand d-flex align-items-center" href="#">
            <img
              src="img/stethoscope_light.png"
              height="50px"
              alt="Изображение фонендоскопа"
            />FormSerializer
          </a>
          <!-- Ссылка на источник изображения: https://sergeychikin.ru/365/ Image by Сергей Чикин, brakodelnya@gmail.com-->

          <!-- Сворачиваемое меню  -->
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <!-- Основные пункты меню (me-auto - выравнивание слева) -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
                <!-- Активная ссылка -->
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
                <!-- Обычная ссылка -->
              </li>

              <!-- Выпадающее меню dropdown -->
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="navbarDropdown"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Dropdown
                </a>
                <!-- Список выпадающего меню -->
                <ul
                  id="main-menu-ul"
                  class="dropdown-menu bg-light"
                  aria-labelledby="navbarDropdown"
                >
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li><a class="dropdown-item" href="#">Another action</a></li>
                  <li>
                    <hr class="dropdown-divider" />
                    <!-- Разделитель пунктов меню -->
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Something else here</a>
                  </li>
                </ul>
              </li>

              <!-- Неактивная  ссылка -->
              <li class="nav-item">
                <a
                  class="nav-link disabled"
                  href="#"
                  tabindex="-1"
                  aria-disabled="true"
                  >Disabled</a
                >
              </li>
            </ul>

            <!-- Форма поиска как flex-контейнер -->
            <form class="d-flex">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-light" type="submit">
                Search
              </button>
              <!-- Кнопка с светлой обводкой -->
            </form>
          </div>
        </div>
      </nav>
    </header>
    <!-- Кнопка открытия меню -->
    <button
      class="btn btn-secondary position-fixed bottom-0 start-0 m-3"
      type="button"
      data-bs-toggle="offcanvas"
      data-bs-target="#sidebarMenu"
      id="main-dropdown-butt"
    >
      ☰
    </button>

    <div class="container">
      <div class="content">
        <!-- Выезжающее меню offcanvas -->
        <div
          class="offcanvas offcanvas-start bg-light"
          id="sidebarMenu"
          aria-labelledby="sidebarLabel"
        >
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="sidebarLabel">Меню</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
            ></button>
          </div>
          <hr />
          <div class="offcanvas-body">
            <!-- Динамическое меню -->
            <ul class="nav nav-pills flex-column mb-auto" id="menu-ul"></ul>
          </div>
        </div>

        <!-- FORM -->
        <form class="form-group" id="main-form">
          <div id="block-1">
            <h3>Осмотр анестезиолога-реаниматолога</h3>
            <!-- НАЧАЛО -- Блок-1: Дата, Антропометрические данные, Группа крови, Резус фактор -->
            <div class="flex-container">
              <div class="flex-left">
                <div class="col-auto" id="date"></div>
                <div class="col-auto" id="time"></div>
              </div>
              <div class="flex-right">
                <div id="blood-gr"></div>
                <div id="blood-gr-rh"></div>
                <div id="block-anthropometric-data">
                  <!-- Heading -->
                </div>
                <!--<div id="spacer-div">&nbsp;</div>-->
                <div id="growth"></div>
                <div id="mass"></div>
                <div id="bsa-result"></div>
              </div>
            </div>
          </div>
          <!-- КОНЕЦ -- Блок-1 -->

          <div id="block-2">
            <!-- НАЧАЛО -- Блок-2: Диагноз -->
            <div class="flex-container">
              <div id="diagnosis"></div>
            </div>
          </div>
          <!-- КОНЕЦ -- Блок-2 -->

          <!----------------------------------->

          <div id="block-3" class="row">
            <!-- НАЧАЛО -- Блок-3: Доп сведения, операции, аллергии итд -->

            <!-- ЛЕВЫЙ СТОЛБЕЦ: жалобы, аллергия, лекарства -->
            <div class="col-md-6">
              <div id="added-info-about-ds" class="mb-3"></div>
              <div id="complaints" class="mb-3"></div>
              <div id="allergy" class="mb-3"></div>
              <div id="drugs" class="mb-3"></div>
            </div>

            <!-- ПРАВЫЙ СТОЛБЕЦ: состояние вен, зубы, операции, вредные привычки -->
            <div class="col-md-6">
              <div id="condition-of-veins" class="mb-3"></div>
              <div id="dentures" class="mb-3"></div>
              <div id="bad-habits" class="mb-3"></div>
              <div id="other-operations" class="mb-3"></div>
            </div>
          </div>
          <!-- Конец -- Блок-3: Доп сведения, операции, аллергии итд -->
          <div id="block-physical-exam"></div>

          <div id="block-4">
            <!-- НАЧАЛО -- Блок-4: Физикальное обследование -->
            <div id="patient-state"></div>
            <div id="patient-consciousness"></div>
            <div id="patient-status-neuro"></div>
            <div id="patient-status-cognitive"></div>
            <div id="patient-skin"></div>
            <div id="patient-edema"></div>
            <div id="patient-heart-tones-1"></div>
            <div id="patient-heart-tones-2"></div>
            <div id="patient-ad"></div>
            <div id="patient-pulse"></div>
            <div id="patient-auscultation-type-1"></div>
            <div id="patient-auscultation-type-2"></div>
            <div id="patient-breath-rate"></div>
            <div id="patient-spo2"></div>
            <div id="patient-abdomen-1"></div>
            <div id="patient-abdomen-2"></div>
            <div id="patient-dyspes"></div>
            <div id="patient-urination"></div>
            <div id="patient-dialisis"></div>
          </div>
          <!-- КОНЕЦ -- Блок-4: Физикальное обследование -->

          <div id="block-5">
            <!-- НАЧАЛО -- Блок-5: Лабораторные данные, дообследование -->
            <div id="analiysis"></div>
            <div id="deep-examination"></div>
          </div>
          <!-- КОНЕЦ -- Блок-5: Лабораторные данные, дообследование -->

          <!----------------------------------->
          <div id="block-6">
            <!-- НАЧАЛО -- Блок-6: Планируемая операция, анестезия... -->
            <div id="planned-operation"></div>
            <div id="planned-anesth"></div>
            <div id="asa"></div>
            <div id="mallampati"></div>
          </div>
          <!-- КОНЕЦ -- Блок-6: Планируемая операция, анестезия... -->

          <!----------------------------------->
          <div id="block-7">
            <!-- НАЧАЛО -- Блок-7: Планируемый мониторинг, премедикация... -->
            <div id="planned-monitoring"></div>
            <div id="premedecation"></div>
            <div id="recomendations"></div>
          </div>
          <!-- КОНЕЦ -- Блок-7: Планируемый мониторинг, премедикация... -->
        </form>

        <button name="button" onclick="getArrayFromForm('main-form')">
          Тык!
        </button>
      </div>
    </div>

    <footer class="bg-light py-4">
      <div class="container text-center">
        FormSerializer © <span id="current-year"></span>
      </div>
    </footer>

    <script src="js/lib/bootstrap.min.js">
      // bootstrap
    </script>
    <script src="js/source.js">
      // JS
    </script>
    <script src="js/variables.js">
      // JS
    </script>
  </body>
</html>
